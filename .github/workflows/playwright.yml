name: Playwright Tests
on:
  push:
    branches: [ main, master, staging ]
  pull_request:
    branches: [ main, master, staging ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      # Opsi 2: Pakai Supabase Cloud DB (production-like)
      # Set DATABASE_URL via GitHub Secrets → Settings → Secrets → Actions
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Generate Prisma Client
      run: npx prisma generate

    # Debug: test koneksi database dulu
    - name: Debug database connection
      run: |
        echo "Testing connection to Supabase..."
        node -e "
        const { Pool } = require('pg');
        const pool = new Pool({
          connectionString: process.env.DATABASE_URL,
          ssl: { rejectUnauthorized: false },
        });
        pool.query('SELECT 1 as connected', (err, res) => {
          if (err) {
            console.error('❌ Connection failed:', err.message);
            process.exit(1);
          }
          console.log('✅ Database connected:', res.rows[0]);
          pool.end();
        });
        "
      env:
        DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

    # Migrasi & seed sudah dijalankan dari lokal ke Supabase
    # - name: Run Prisma Migrations (setup DB staging)
    #   run: npx prisma migrate deploy
    # - name: Seed database for testing
    #   run: npx prisma db seed

    - name: Run Playwright tests
      run: npx playwright test
      env:
        DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
