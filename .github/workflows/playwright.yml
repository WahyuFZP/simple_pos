name: Playwright Tests
on:
  push:
    branches: [ main, master, staging ]
  pull_request:
    branches: [ main, master, staging ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      # Opsi 2: Pakai Supabase Cloud DB (production-like)
      # Set DATABASE_URL via GitHub Secrets → Settings → Secrets → Actions
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Generate Prisma Client
      run: npx prisma generate

    # Resolve IPv4 untuk Supabase (GitHub Actions IPv6 issue)
    - name: Run Prisma Migrations with IPv4
      run: |
        HOST="db.iozfxtrbbrtbsmvqwqka.supabase.co"
        echo "Resolving IPv4 for $HOST..."
        IPV4=$(python3 -c "import socket; print(socket.gethostbyname('$HOST'))")
        echo "✅ $HOST → $IPV4"
        URL="${{ secrets.SUPABASE_DATABASE_URL }}"
        URL_IPV4="${URL//$HOST/$IPV4}"
        echo "Running migrations..."
        DATABASE_URL="$URL_IPV4" npx prisma migrate deploy

    - name: Seed database for testing
      run: |
        HOST="db.iozfxtrbbrtbsmvqwqka.supabase.co"
        IPV4=$(python3 -c "import socket; print(socket.gethostbyname('$HOST'))")
        URL="${{ secrets.SUPABASE_DATABASE_URL }}"
        URL_IPV4="${URL//$HOST/$IPV4}"
        DATABASE_URL="$URL_IPV4" npx prisma db seed

    - name: Run Playwright tests
      run: npx playwright test
      env:
        DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
